syntax = "proto3";
package cryptov1;
option go_package = "github.com/cnt-payz/payz/crypto;cryptopb";

import "google/protobuf/empty.proto";

service CryptoService {
    rpc Deposit(DepositReq) returns (ExTransaction);
    rpc GetWalletByShopID(GetWalletByShopIDReq) returns (Wallet);
    rpc Withdraw(WithdrawReq) returns (google.protobuf.Empty);
}

message ExTransaction {
    string transaction_id = 1;
    string amount = 2;
    string target_address = 3;
    string taker_address = 4;
}

message Wallet {
    string id = 1;
    string shop_id = 2;
    string address = 3;
    string frozen_amount = 4;
    string amount = 5;
}

message DepositReq {
    string transaction_id = 1;
    string shop_id = 2;
    string amount = 3;
    string taker_address = 4;
}

message GetWalletByShopIDReq {
    string shop_id = 1;
}

message WithdrawReq {
    string shop_id = 1;
    string amount = 2;
    string target_address = 3;
}
